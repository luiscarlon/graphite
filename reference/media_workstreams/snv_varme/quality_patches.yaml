  # --- B217.VP1 — multi-event: offline Aug 5, two swaps Oct 4 + Oct 9 ---
  - annotation_id: ann-snv-varme-b217-offline
    target_kind: meter
    target_id: B217.VP1_VMM61
    category: outage
    valid_from: 2025-08-05
    valid_to: 2025-10-04
    description: >-
      Counter went offline 2025-08-05 at value 662831.21. Resumed with
      a device swap on 2025-10-04 (value 2958426.22, then again on
      2025-10-09 at 23724.03). Combined multi-event pattern handled by
      3-segment split :d.A | :d.B | :d.C via rolling_sum. The gap
      between Aug 5 and Oct 4 is flat-carried by rolling_sum;
      consumption during those 60 days is lost from the canonical
      counter — candidate for a children-sum or interpolate patch if
      we want to recover the integral (see followups).
    related_refs:
      - B217.VP1_VMM61:d.A
      - B217.VP1_VMM61:d.B
      - B217.VP1_VMM61:d.C
      - B217.VP1_VMM61:d

