# Hand-authored data-quality annotations and patches for Snäckviken heating (värme).
#
# Applied by reference/scripts/apply_quality_patches.py.
#
# Current state: all Jan/Feb 2026 Excel comparisons match. Five device
# swaps already handled via rolling_sum segment splits. YAML documents
# each one so the ontology self-describes the state.

annotations:

  # --- B201.VP1 — 2025-08-05 swap, already split A|B ---
  - annotation_id: ann-snv-varme-b201-swap
    target_kind: meter
    target_id: B201.VP1_VMM61
    category: swap
    valid_from: 2025-08-05
    valid_to: 2025-08-05
    description: >-
      Device swap 2025-08-05 (last value 67.26). Handled by 2-segment
      split B201.VP1_VMM61:d.A | :d.B via rolling_sum.
    related_refs:
      - B201.VP1_VMM61:d.A
      - B201.VP1_VMM61:d.B
      - B201.VP1_VMM61:d

  # --- B217.VP1 — multi-event: offline Aug 5, two swaps Oct 4 + Oct 9 ---
  - annotation_id: ann-snv-varme-b217-offline
    target_kind: meter
    target_id: B217.VP1_VMM61
    category: outage
    valid_from: 2025-08-05
    valid_to: 2025-10-04
    description: >-
      Counter went offline 2025-08-05 at value 662831.21. Resumed with
      a device swap on 2025-10-04 (value 2958426.22, then again on
      2025-10-09 at 23724.03). Combined multi-event pattern handled by
      3-segment split :d.A | :d.B | :d.C via rolling_sum. The gap
      between Aug 5 and Oct 4 is flat-carried by rolling_sum;
      consumption during those 60 days is lost from the canonical
      counter — candidate for a children-sum or interpolate patch if
      we want to recover the integral (see followups).
    related_refs:
      - B217.VP1_VMM61:d.A
      - B217.VP1_VMM61:d.B
      - B217.VP1_VMM61:d.C
      - B217.VP1_VMM61:d

  - annotation_id: ann-snv-varme-b217-swap-oct
    target_kind: meter
    target_id: B217.VP1_VMM61
    category: swap
    valid_from: 2025-10-04
    valid_to: 2025-10-09
    description: >-
      Two back-to-back swaps 2025-10-04 and 2025-10-09 (values
      2958426.22 and 23724.03). Segment :d.B covers the 5-day window
      between; :d.C carries forward from 2025-10-09.
    related_refs:
      - B217.VP1_VMM61:d.B
      - B217.VP1_VMM61:d.C

