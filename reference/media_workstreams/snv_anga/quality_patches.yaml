# Hand-authored data-quality annotations and patches for Snäckviken steam (ånga).
#
# Loaded by reference/scripts/apply_quality_patches.py after
# build_ontology.py and generate_outage_patches.py. Edits here survive
# a workstream rebuild; delete an entry to roll the patch back.
#
# Applied into:
#   reference/media_workstreams/snv_anga/05_ontology/annotations.csv
#   reference/media_workstreams/snv_anga/05_ontology/timeseries_refs.csv
#
# This revision:
#   1. Annotates every existing segment split, children-sum patch,
#      leaf-dead meter, and known Excel bug.
#   2. Restructures B217.Å1_VMM71 from the 4-segment (A|B|C|D) split
#      (which flat-carries across the corruption gaps and loses
#      ~484 MWh of real Jul–Oct 2025 consumption) into a single full-
#      period raw ref + a `bracket` derived ref that filters the
#      multi-register artifacts out. See the `delete` + `refs` blocks
#      below and `reference/docs/snv_anga_followups.md` for rationale.

annotations:

  # ---------------------------------------------------------------
  # B217 — BMS register corruption (Jul 2025 → Oct 2025)
  # ---------------------------------------------------------------
  - annotation_id: ann-snv-anga-b217-register-corruption
    target_kind: meter
    target_id: B217.Å1_VMM71
    category: data_quality
    valid_from: 2025-07-15
    valid_to: 2025-10-10
    description: >-
      Upstream BMS (/SESOWABMSPD04) polled the wrong register for ~87
      days. Raw hourly samples alternate between the real counter
      (~7k MWh band), a near-zero artifact (< 100), and a stuck-high
      value (~805k). Handled by `bracket` on :d.raw: keep only samples
      whose value lies between the source values at the bracket
      validity boundaries (pre-gap clean and post-gap clean). Recovers
      the real-register samples that survive V_LAST aggregation;
      artifact days remain as gaps in the :d output, which LAG-based
      delta views treat as cross-gap accumulation.
    related_refs:
      - B217.Å1_VMM71:d.raw
      - B217.Å1_VMM71:d.clip
      - B217.Å1_VMM71:d

  - annotation_id: ann-snv-anga-b217-patch-clip
    target_kind: timeseries
    target_id: B217.Å1_VMM71:d.clip
    category: patch
    valid_from: 2025-07-15
    valid_to: 2025-10-10
    description: >-
      Bracket patch: parameter-free monotone value-range clip over
      :d.raw's readings. Endpoints (v_lo, v_hi) derive from the
      source's readings immediately outside the validity window — the
      last clean pre-corruption value and the first clean post-corruption
      value. Any reading whose value falls outside [v_lo, v_hi] is
      physically impossible for a monotone counter and is dropped.
    related_refs:
      - B217.Å1_VMM71:d.raw

  # ---------------------------------------------------------------
  # B216 — froze mid-February 2026; children-sum patch active
  # ---------------------------------------------------------------
  - annotation_id: ann-snv-anga-b216-offline
    target_kind: meter
    target_id: B216.Å1_VMM71
    category: outage
    valid_from: 2026-02-19
    description: >-
      Counter froze 2026-02-19 at value 12121.072. Ontology stitches
      raw segment (:d.raw, valid_to 2026-02-19) with a children-sum
      patch (:d.patch, sum of B217.Å1_VMM71:d.D) via rolling_sum.
    related_refs:
      - B216.Å1_VMM71:d.raw
      - B216.Å1_VMM71:d.patch
      - B216.Å1_VMM71:d

  - annotation_id: ann-snv-anga-b216-patch
    target_kind: timeseries
    target_id: B216.Å1_VMM71:d.patch
    category: patch
    valid_from: 2026-02-19
    description: >-
      Children-sum patch: recovers B216 consumption from its sole
      child B217.Å1_VMM71 after B216's counter froze. Assumes B217
      captures all B216 downstream flow; the ~28 MWh Feb-2026 vs-Excel
      delta is the pre-freeze (Feb 1 → Feb 18) portion that Excel's
      STRUX register-diff absorbed as zero.
    related_refs:
      - B217.Å1_VMM71:d.D

  # ---------------------------------------------------------------
  # B308 — frozen since 2025; B327 children-sum patch
  # ---------------------------------------------------------------
  - annotation_id: ann-snv-anga-b308-frozen
    target_kind: meter
    target_id: B308.Å1_VMM71
    category: outage
    valid_from: 2025-01-01
    description: >-
      Counter frozen at 12737.1533 for the entire observed window; last
      real reading predates the 2025-01-01 ingest start. Patched from
      child B327.Å1_VMM71 via sum from 2026-02-07 onward.
    related_refs:
      - B308.Å1_VMM71:d.raw
      - B308.Å1_VMM71:d.patch
      - B308.Å1_VMM71:d

  - annotation_id: ann-snv-anga-b308-patch
    target_kind: timeseries
    target_id: B308.Å1_VMM71:d.patch
    category: patch
    valid_from: 2026-02-07
    description: >-
      Children-sum patch: B327.Å1_VMM71 (sole child) stands in for
      B308's frozen counter. Produces meter_net ≈ 0 (as children equal
      parent). Feb-2026 Excel shows −30.78 vs ontology −8.98 MWh; the
      ~22 MWh gap is pre-patch Feb-1 → Feb-7 that the ontology does
      not reconstruct.
    related_refs:
      - B327.Å1_VMM71:d

  # ---------------------------------------------------------------
  # B307 — VMM71 + VMM72 device swaps on 2025-07-31
  # ---------------------------------------------------------------
  - annotation_id: ann-snv-anga-b307-vmm71-swap
    target_kind: meter
    target_id: B307.Å1_VMM71
    category: swap
    valid_from: 2025-07-31
    valid_to: 2025-07-31
    description: >-
      Device register swap on 2025-07-31 (last value 2227.0615).
      Handled by 2-segment split :d.A | :d.B stitched via rolling_sum.
    related_refs:
      - B307.Å1_VMM71:d.A
      - B307.Å1_VMM71:d.B
      - B307.Å1_VMM71:d

  - annotation_id: ann-snv-anga-b307-vmm72-swap
    target_kind: meter
    target_id: B307.Å1_VMM72
    category: swap
    valid_from: 2025-07-31
    valid_to: 2025-07-31
    description: >-
      Device register swap on 2025-07-31. Handled by 2-segment split
      :d.A | :d.B stitched via rolling_sum.
    related_refs:
      - B307.Å1_VMM72:d.A
      - B307.Å1_VMM72:d.B
      - B307.Å1_VMM72:d

  # ---------------------------------------------------------------
  # B315 — device swap mid-January 2026
  # ---------------------------------------------------------------
  - annotation_id: ann-snv-anga-b315-swap
    target_kind: meter
    target_id: B315.Å1_VMM71
    category: swap
    valid_from: 2026-01-13
    valid_to: 2026-01-13
    description: >-
      Device swap on 2026-01-13 (last value 3019.23). Handled by
      2-segment split :d.A | :d.B stitched via rolling_sum.
    related_refs:
      - B315.Å1_VMM71:d.A
      - B315.Å1_VMM71:d.B
      - B315.Å1_VMM71:d

  # ---------------------------------------------------------------
  # Dead / leaf meters — no patch possible, annotation only
  # ---------------------------------------------------------------
  - annotation_id: ann-snv-anga-b390-offline
    target_kind: meter
    target_id: B390.Å1_VMM70
    category: outage
    valid_from: 2025-07-31
    description: >-
      Counter went offline 2025-07-31 at 328545. Downstream of B325
      Panna2; no children to patch from — consumption beyond this date
      is unrecoverable from B390 alone. Leaf meter relative to its
      intended topology branch.
    related_refs:
      - B390.Å1_VMM70:d

  - annotation_id: ann-snv-anga-b313-offline
    target_kind: meter
    target_id: B313.Å1_VMM71
    category: outage
    valid_from: 2025-07-25
    description: >-
      Counter went offline 2025-07-25 at 133.0. Leaf meter; no
      children available for a sum-patch.
    related_refs:
      - B313.Å1_VMM71:d

  - annotation_id: ann-snv-anga-b385-offline
    target_kind: meter
    target_id: B385.Å1_VMM71
    category: outage
    valid_from: 2025-11-26
    description: >-
      Counter went offline 2025-11-26 at near-zero value (0.00213...).
      Leaf meter; no children available for a sum-patch.
    related_refs:
      - B385.Å1_VMM71:d

  # ---------------------------------------------------------------
  # Known Excel bug — topology cannot mirror (documented, not fixable)
  # ---------------------------------------------------------------
  - annotation_id: ann-snv-anga-b307-excel-double-subtract
    target_kind: meter
    target_id: B307.Å1_VMM71
    category: unknown
    description: >-
      Excel row 23 (B307 pool formula) subtracts B330.Å1_VMM71, and
      row 46 (B337) subtracts the same meter — B330 is double-counted
      in the Excel totals. Ontology attaches B330 to B337 per
      decisions.md 2026-04-20; B307 therefore over-counts in topology
      by Δ(B330) each month (~0.9 MWh Jan-2026, ~27 MWh Feb-2026).
      Excel is immutable; this discrepancy is expected and permanent.
    related_refs:
      - B307.Å1_VMM71:d
      - B330.Å1_VMM71:d
      - B337.Å1_VMM71:d

  # ---------------------------------------------------------------
  # Source-conflict flag — direction not yet resolved
  # ---------------------------------------------------------------
  - annotation_id: ann-snv-anga-b311-direction-conflict
    target_kind: meter
    target_id: B311.Å1_VMM70
    category: unknown
    description: >-
      Direction conflict between flow_schema and naming extractor for
      the B311.Å1_VMM70 ↔ B311.Å1_VMM71 edge. Not yet resolved in
      decisions.md. Does not affect Jan/Feb 2026 totals because both
      meters are leaf-level relative to their building's accounting.
    related_refs: []


# B217.Å1_VMM71 — drop the auto-generated 4-segment split and replace
# with a single full-period raw + bracket derived ref. Each rebuild
# will re-emit :d.A/B/C/D (driven by meter_swaps.csv entries) and a
# rolling_sum :d; Phase 7 then removes them and installs the bracket
# pair below. Idempotent.
delete:
  refs:
    - B217.Å1_VMM71:d.A
    - B217.Å1_VMM71:d.B
    - B217.Å1_VMM71:d.C
    - B217.Å1_VMM71:d.D
  annotations:
    # Glitch-sub annotations referencing the removed A|B|C|D segments.
    # The broader `ann-snv-anga-b217-register-corruption` already
    # captures the event window.
    - ann-snv-anga-b217-glitch-aug
    - ann-snv-anga-b217-glitch-sep


refs:
  # Full-period raw — the unmodified daily counter from Snowflake,
  # preferred=False. Kept as the factual record of what the upstream
  # DB served, including the Jul–Oct 2025 multi-register artifacts.
  - timeseries_id: B217.Å1_VMM71:d.raw
    sensor_id: B217.Å1_VMM71.energy
    aggregate: daily
    reading_type: counter
    kind: raw
    preferred: false
    database_id: ion_sweden_bms
    path: OPS_WRK.ION_SWEDEN.DATALOG2
    external_id: B217.Å1_VM71

  # Bracket clip over the corruption window. Endpoints come from
  # :d.raw readings just outside [valid_from, valid_to): the last
  # pre-gap clean value and the first post-gap clean value. Output
  # keeps only source samples whose value lies in that range, so
  # artifact days (<100 or >100k) drop out as gaps.
  - timeseries_id: B217.Å1_VMM71:d.clip
    sensor_id: B217.Å1_VMM71.energy
    aggregate: daily
    reading_type: counter
    kind: derived
    preferred: false
    sources:
      - B217.Å1_VMM71:d.raw
    aggregation: bracket
    valid_from: 2025-07-15
    valid_to: 2025-10-10

  # New preferred canonical: rolling_sum stitches the bracket-cleaned
  # corruption window over the raw counter. Outside the corruption
  # window the raw is the only source with readings, so rolling_sum
  # passes it through; inside the window the clip output takes over,
  # and the flat-carry behaviour across bracket's gaps (artifact days)
  # is honest — it's exactly how much consumption the upstream DB
  # actually conveyed on a given day.
  - timeseries_id: B217.Å1_VMM71:d
    sensor_id: B217.Å1_VMM71.energy
    aggregate: daily
    reading_type: counter
    kind: derived
    preferred: true
    sources:
      - B217.Å1_VMM71:d.raw
      - B217.Å1_VMM71:d.clip
    aggregation: rolling_sum
