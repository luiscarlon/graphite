  - annotation_id: ann-snv-anga-b385-offline
    target_kind: meter
    target_id: B385.Å1_VMM71
    category: outage
    valid_from: 2025-11-26
    description: >-
      Counter went offline 2025-11-26 at near-zero value (0.00213...).
      Leaf meter; no children available for a sum-patch.
    related_refs:
      - B385.Å1_VMM71:d

  # ---------------------------------------------------------------
  # Known Excel bug — topology cannot mirror (documented, not fixable)
  # ---------------------------------------------------------------
  - annotation_id: ann-snv-anga-b307-excel-double-subtract
    target_kind: meter
    target_id: B307.Å1_VMM71
    category: unknown
    description: >-
      Excel row 23 (B307 pool formula) subtracts B330.Å1_VMM71, and
      row 46 (B337) subtracts the same meter — B330 is double-counted
      in the Excel totals. Ontology attaches B330 to B337 per
      decisions.md 2026-04-20; B307 therefore over-counts in topology
      by Δ(B330) each month (~0.9 MWh Jan-2026, ~27 MWh Feb-2026).
      Excel is immutable; this discrepancy is expected and permanent.
    related_refs:
      - B307.Å1_VMM71:d
      - B330.Å1_VMM71:d
      - B337.Å1_VMM71:d

  # ---------------------------------------------------------------
  # Source-conflict flag — direction not yet resolved
  # ---------------------------------------------------------------
  - annotation_id: ann-snv-anga-b311-direction-conflict
    target_kind: meter
    target_id: B311.Å1_VMM70
    category: unknown
    description: >-
      Direction conflict between flow_schema and naming extractor for
      the B311.Å1_VMM70 ↔ B311.Å1_VMM71 edge. Not yet resolved in
      decisions.md. Does not affect Jan/Feb 2026 totals because both
      meters are leaf-level relative to their building's accounting.
    related_refs: []
