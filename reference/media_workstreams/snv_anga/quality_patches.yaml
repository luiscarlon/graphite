# B217.Å1_VMM71 bracket restructure reverted (was here earlier). At
# daily V_LAST aggregation the bracket filter only keeps 5 samples
# across 87 corruption-window days; rolling_sum's concat semantics
# then interleave those 5 clean values with 82 raw-corrupt values,
# producing broken stitched output (including negative counter values
# at the bracket→raw→bracket transitions). The restructure has been
# reverted so the auto-generated A|B|C|D split stays in place.
#
# See reference/docs/snv_anga_followups.md §1.1 for the analysis. The
# proper fix requires one of:
#   (a) hourly source data — shrinks the mismatch between sample
#       cadence and reset-instant granularity so bracket keeps
#       ~53 of 87 days, enough density for rolling_sum; OR
#   (b) a new `overlay` aggregation that lets a more-restricted-
#       validity source shadow a full-period source within its window
#       (including skipping emission entirely on days where the
#       shadow source has no reading).
    is_resolved: false

