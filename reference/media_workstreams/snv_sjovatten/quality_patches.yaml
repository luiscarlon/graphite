# Hand-authored data-quality annotations and patches for Snäckviken seawater (sjövatten).
#
# Applied by reference/scripts/apply_quality_patches.py.
#
# Most Jan/Feb 2026 Excel residuals trace to (a) a sheet-level
# residual meter "BPS_V2" that is fractionally split to four tenant
# buildings with monthly-variable coefficients, and (b) a STRUX-only
# meter whose cached Excel values are not reproducible from Snowflake.
# Both are structural Excel features, not data-quality fixes.

annotations:

  # ---------------------------------------------------------------
  # BPS_V2 fractional pool — Excel construct, not mirrorable
  # ---------------------------------------------------------------
  - annotation_id: ann-snv-sv-bps-v2-pool
    target_kind: campus
    target_id: SNV
    category: calibration
    description: >-
      The Excel sjövatten sheet uses a virtual residual meter
      "BPS_V2" (= B342 total inlet − 15 direct consumers) that is
      fractionally distributed to four buildings: B301 @ 0.09,
      B302 @ 0.18, B303 @ 0.18, B307 @ 0.46 (total 0.91). The
      remaining 0.09 is unattributed in Excel. Coefficients vary
      month-to-month in the live sheet's hidden R-column. views.sql
      does not yet support fractional-subtract primitives, so
      B301/B302/B303/B307 under-count in topology vs Excel. Jan-2026
      residuals: B301 −540, B302 −1081, B303 −1081, B307 −2761 kWh.
      Feb-2026 residuals scale with load: B301 −2685, B302/B303
      −5369 each, B307 −13721 kWh. Permanent until a weighted-
      subtract primitive exists.
    related_refs: []

  - annotation_id: ann-snv-sv-b304-strux-only
    target_kind: meter
    target_id: B304-52-V2-AW026
    category: unknown
    description: >-
      B304-52-V2-AW026 is a manually-read STRUX meter with no
      Snowflake equivalent. Excel caches the meter's monthly value;
      ontology reads zero. B304 therefore under-counts by the STRUX
      cached value each month (−29640 Jan-2026, −43483 Feb-2026).
      Per project convention, STRUX-only meters are never synthesized
      as Snowflake rows.
    related_refs: []

  # ---------------------------------------------------------------
  # B334 multi-event — offline Aug 5 + swap Nov 30
  # ---------------------------------------------------------------
  - annotation_id: ann-snv-sv-b334-offline
    target_kind: meter
    target_id: B334.V2_VM90_V
    category: outage
    valid_from: 2025-08-05
    valid_to: 2025-11-30
    description: >-
      Counter went offline 2025-08-05 at value 335549.97 and resumed
      with a device swap on 2025-11-30 at value 364454.09. Combined
      pattern covered by 2-segment split :d.A | :d.B via rolling_sum.
      The ~4-month gap is flat-carried; if B334 has upstream data
      or siblings that capture the physical flow, an interpolate
      patch could recover the integral. Outside Jan/Feb 2026
      reference period so no facit impact.
    related_refs:
      - B334.V2_VM90_V:d.A
      - B334.V2_VM90_V:d.B
      - B334.V2_VM90_V:d

  - annotation_id: ann-snv-sv-b342-swap
    target_kind: meter
    target_id: B342.V2_VM91_V
    category: swap
    valid_from: 2025-02-17
    valid_to: 2025-02-17
    description: >-
      Device swap 2025-02-17 (last value 758607.50). Outside Jan/Feb
      2026 reference period.

  # ---------------------------------------------------------------
  # Leaf offlines
  # ---------------------------------------------------------------
  - annotation_id: ann-snv-sv-b229-offline
    target_kind: meter
    target_id: B229.V2_VMM51
    category: outage
    valid_from: 2026-02-20
    description: >-
      Counter went offline 2026-02-20 at value 9471341.0. Inside
      Feb 2026 reference period — affects last 8 days of the month.

  - annotation_id: ann-snv-sv-b305-offline
    target_kind: meter
    target_id: B305.V2_VMM21
    category: outage
    valid_from: 2025-10-18
    description: >-
      Counter went offline 2025-10-18 at value 6.60 (essentially
      zero before offline too). Outside Jan/Feb 2026.

  - annotation_id: ann-snv-sv-b339-offline
    target_kind: meter
    target_id: B339.V2_GF4
    category: outage
    valid_from: 2025-05-19
    description: >-
      Counter went offline 2025-05-19 at value 4840979.0. Outside
      Jan/Feb 2026.
