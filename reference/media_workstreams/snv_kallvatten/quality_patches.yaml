      flush 2026-01-14 (+8.59 m³). Low magnitude but same BMS-gateway
      event as B310.KV1_VMM23_V. Patched via 3-segment rolling_sum
      with interpolate across the flat window. Same mirror-dip effect
      on B311's pool (B310.KV1_VM20_V is −term in B311).
    related_refs:
