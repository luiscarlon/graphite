# Hand-authored data-quality annotations and patches for Snäckviken cold water (kallvatten).
#
# Applied by reference/scripts/apply_quality_patches.py.
#
# Most Jan/Feb 2026 Excel deltas trace to triple-meter attribution
# bugs in the Excel sheet (B313, B315 claimed by multiple parent rows).
# Those are immutable in Excel and documented here as `unknown`
# category so the ~140 MWh cumulative topology/Excel gap is explained
# rather than hidden.

annotations:

  # ---------------------------------------------------------------
  # Excel double-attribution conflicts (immutable, document only)
  # ---------------------------------------------------------------
  - annotation_id: ann-snv-kv-b313-double-subtract
    target_kind: meter
    target_id: B313.KV1_VMM22_V
    category: unknown
    valid_from: 1900-01-01
    valid_to: 9999-01-01
    description: >-
      Excel double-subtracts this meter: it appears as a subtracted
      −term on row 26 (B310 formula) AND on row 30 (B314 formula).
      Ontology enforces one-parent-per-meter and attached it to B314
      (shorter-formula-wins). B310 therefore over-counts vs Excel by
      Δ(B313.KV1_VMM22_V) each month (+120.82 MWh Jan-2026,
      +26.73 MWh Feb-2026). Excel is immutable.
    related_refs:
      - B310.KV1:d
      - B314.KV1:d
    is_resolved: false
  - annotation_id: ann-snv-kv-b315-double-subtract
    target_kind: meter
    target_id: B315.KV1_VMM21_V
    category: unknown
    valid_from: 1900-01-01
    valid_to: 9999-01-01
    description: >-
      Excel lists B315.KV1_VMM21_V as both a +term on row 30 (B314)
      AND the sole +term on row 31 (B315). Ontology attached the
      meter to B315 (prefix-match convention). Result: B311 over-
      counts by +23.72 Jan / +15.22 Feb (via the pool share), and
      B314 under-counts by the same magnitude. B315 itself matches
      Excel exactly. Excel is immutable.
    related_refs:
      - B311.KV1:d
      - B314.KV1:d
      - B315.KV1:d

