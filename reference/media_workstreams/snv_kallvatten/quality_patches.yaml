  # ---------------------------------------------------------------
  # Winter-offline + single catch-up flush 2026-01-14 (BMS gateway
  # outage affecting several KV meters simultaneously — same family
  # as the ÅNGA B317.Å1_VMM72 winter event). Each meter patched with
  # an interpolate across the flat window between clean endpoints
  # 2025-09-20 (last clean) and 2026-01-14 (first post-flush tick).
  # ---------------------------------------------------------------
  - annotation_id: ann-snv-kv-b310-vmm23-winter-offline
    target_kind: meter
    target_id: B310.KV1_VMM23_V
    category: outage
    valid_from: 2025-09-21
    valid_to: 2026-01-14
    description: >-
      Counter flat for 115 days (2025-09-21 → 2026-01-13) at 5987.662,
      then single catch-up flush on 2026-01-14 (+1962.80 m³, ~17.1
      m³/day across the window — consistent with pre-flat rate
      15.7/day and post-flush rate 19.1/day). BMS gateway outage. A
      raw daily-delta view would show a spike on 2026-01-14 at B310
      (+1963) and a mirror dip at B311 (−1963) since B310.KV1_VM23_V
      is a −term in B311's 15-term pool. Patched via 3-segment
      rolling_sum (:d.A slice valid_to=2025-09-21 | :d.patch
      interpolate 2025-09-21→2026-01-14 | :d.B slice
      valid_from=2026-01-14), same pattern as
      ann-snv-anga-b317-vmm72-offline-winter for ÅNGA.
    related_refs:
      - B310.KV1_VMM23_V:d.raw
      - B310.KV1_VMM23_V:d.A
      - B310.KV1_VMM23_V:d.patch
      - B310.KV1_VMM23_V:d.B
      - B310.KV1_VMM23_V:d
    is_resolved: true

  - annotation_id: ann-snv-kv-b310-vmm20-winter-offline
    target_kind: meter
    target_id: B310.KV1_VMM20_V
    category: outage
