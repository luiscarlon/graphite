    is_resolved: true

  - annotation_id: ann-snv-kv-b314-vm22-installed-apr2025
    target_kind: meter
    target_id: B314.KV1_VMM22_V
    category: data_quality
    valid_from: 2025-04-22
    description: >-
      B314.KV1_VM22_V was installed on 2025-04-22 per reference formula
      doc ("OBS B314.KV1_VM22_V installerades 2025-04-22"). Pre-install
