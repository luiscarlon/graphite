  - annotation_id: ann-snv-kv-b409-offline
    target_kind: meter
    target_id: B409.KV1_VM21
    category: outage
    valid_from: 2025-10-17
    description: >-
      Counter went offline 2025-10-17 at value 236425.72. Leaf meter;
      no children for sum-patch. Outside Jan/Feb 2026 reference.

  - annotation_id: ann-snv-kv-b301-offline
    target_kind: meter
    target_id: B301.KV1_VMM21_V
    category: outage
    valid_from: 2026-01-14
    description: >-
      Counter went offline 2026-01-14 at value 278.83. Inside the
      Jan 2026 reference period — affects Jan 14 → Feb 28. Ref
      carries valid_to so downstream gets zero delta post-outage
      (flat-carry equivalent). Excel total not materially impacted
      (B301 is a small consumer).

