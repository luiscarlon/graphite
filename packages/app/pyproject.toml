[project]
name = "app"
version = "0.1.0"
description = "Streamlit app for ontology browsing and curation"
requires-python = ">=3.12"
dependencies = [
    "ontology",
    "validation",
    "calc",
    "streamlit>=1.38",
    "graphviz>=0.20",
    "plotly>=5.24",
    "altair>=5",
    "pandas>=2",
]

[tool.uv.sources]
ontology = { workspace = true }
validation = { workspace = true }
calc = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/app"]
