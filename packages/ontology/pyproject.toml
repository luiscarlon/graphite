[project]
name = "ontology"
version = "0.1.0"
description = "Brick Schema ontology tables and I/O"
requires-python = ">=3.12"
dependencies = [
    "duckdb>=1.1",
    "pydantic>=2.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ontology"]
