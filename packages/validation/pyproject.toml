[project]
name = "validation"
version = "0.1.0"
description = "Write-time ontology validation rules"
requires-python = ">=3.12"
dependencies = [
    "ontology",
]

[tool.uv.sources]
ontology = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/validation"]
