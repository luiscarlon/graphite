[project]
name = "refsite"
version = "0.1.0"
description = "Deterministic fabricated reference site generator"
requires-python = ">=3.12"
dependencies = [
    "ontology",
    "validation",
    "numpy>=2.0",
]

[project.scripts]
refsite-generate = "refsite.cli:main"

[tool.uv.sources]
ontology = { workspace = true }
validation = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/refsite"]
