[project]
name = "calc"
version = "0.1.0"
description = "SQL views for meter nets and topological aggregations"
requires-python = ">=3.12"
dependencies = [
    "ontology",
    "duckdb>=1.1",
]

[tool.uv.sources]
ontology = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/calc"]
